<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;700&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <article class="article-card">
    <img class="article-image" src="assets/images/illustration-article.svg" alt="Illustration d’un article HTML & CSS"/>
    <a href="#" class="article-type">Learning</a>

    <p class="article-date">Published <time datetime="2023-12-21">21 Dec 2023</time></p>

    <h2 class="article-title">HTML & CSS foundations</h2>

    <p class="article-paragraph">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    <address class="article-author">
      <img src="assets/images/image-avatar.webp" alt="Greg Hooper" class="article-author-img" />
      <p class="article-author-name">Greg Hooper</p>
    </address>
    
  </article>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">HK08</a>.
  </div>
</body>
</html>
